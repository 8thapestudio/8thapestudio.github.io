<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>8th Ape Studio | AI Music & Visual Experience</title>
<meta name="description" content="8th Ape Studio creates experimental music, AI visuals and digital experiences.">

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<style>
body {
  margin:0;
  font-family:'Orbitron', sans-serif;
  background:black;
  color:white;
  overflow-x:hidden;
}

/* BACKGROUND ANIMATION */
.bg {
  position:fixed;
  width:100%;
  height:100%;
  background: radial-gradient(circle at center, #001111, black 70%);
  z-index:-1;
  animation: pulse 6s infinite alternate;
}

@keyframes pulse {
  0% { opacity:0.7; }
  100% { opacity:1; }
}

/* HERO */
.hero {
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
}

/* GLITCH TITLE */
h1 {
  font-size:3rem;
  color:#00f0ff;
  position:relative;
  text-shadow:0 0 10px #00f0ff;
  animation: glitch 2s infinite;
}

@keyframes glitch {
  0% { text-shadow:2px 0 red, -2px 0 blue; }
  20% { text-shadow:-2px 0 red, 2px 0 blue; }
  40% { text-shadow:2px 2px red, -2px -2px blue; }
  60% { text-shadow:0 0 #00f0ff; }
  100% { text-shadow:0 0 10px #00f0ff; }
}

p {
  opacity:0.7;
  margin:20px 0;
}

/* BUTTONS */
.buttons {
  margin-top:20px;
}

.btn {
  display:inline-block;
  margin:10px;
  padding:12px 24px;
  border:1px solid #00f0ff;
  color:#00f0ff;
  text-decoration:none;
  transition:0.3s;
}

.btn:hover {
  background:#00f0ff;
  color:black;
  box-shadow:0 0 20px #00f0ff;
}

/* SECTION */
.section {
  padding:100px 20px;
  text-align:center;
}

.footer {
  text-align:center;
  padding:20px;
  opacity:0.5;
}
</style>
</head>

<body>

<div class="bg"></div>

<div class="hero">
  <h1>8th Ape Studio</h1>
  <p>AI Music · Visual Experiments · Digital Identity</p>

  <div class="buttons">
    <a href="#music" class="btn">Listen</a>
    <a href="#projects" class="btn">Projects</a>
    <a href="#contact" class="btn">Contact</a>
  </div>
</div>

<div id="music" class="section">
  <h2>Music</h2>
  <p>Latest releases coming soon</p>
</div>

<div id="projects" class="section">
  <h2>Projects</h2>
  <p>AI video · experimental visuals · digital art</p>
</div>

<div id="contact" class="section">
  <h2>Contact</h2>
  <p>8thApe-Sound@proton.me</p>
</div>

<div class="footer">
  © 8th Ape Studio
</div>

</body>
</html>
