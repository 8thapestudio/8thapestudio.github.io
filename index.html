<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>8th Ape Studio</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<style>
body {
  margin:0;
  font-family:'Orbitron', sans-serif;
  color:white;
  background:black;
  text-align:center;
}

/* LANGUAGE */
.lang-switch {
  position:fixed;
  top:15px;
  right:20px;
  z-index:10;
}

.lang-switch button {
  border:1px solid #00f0ff;
  background:none;
  color:#00f0ff;
  margin:2px;
  padding:6px 12px;
  cursor:pointer;
  opacity:0.5;
}

.lang-switch button.active {
  background:#00f0ff;
  color:black;
  opacity:1;
}

/* HERO */
.hero {
  position:relative;
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:flex-end;
  align-items:center;
  padding-bottom:12vh;
}

/* BUBBLE */
.bg-image {
  position:absolute;
  top:32%;
  left:50%;
  transform:translate(-50%, -50%);
  width:60vw;
  max-width:700px;
  opacity:0.9;
  animation: float 8s ease-in-out infinite;
  filter: drop-shadow(0 0 40px #00f0ff);
  transition:0.5s ease;
  z-index:1;
  cursor:pointer;
}

@keyframes float {
  0%,100% { transform:translate(-50%, -50%) scale(1); }
  50% { transform:translate(-50%, -54%) scale(1.03); }
}

/* TITLE */
.title {
  font-size:3.5rem;
  text-shadow:0 0 25px #00f0ff;
  transition:0.5s ease;
  cursor:pointer;
}

/* TAGLINE */
.tagline {
  opacity:0;
  transform:translateY(-40px);
  transition:0.5s ease;
  font-size:1.2rem;
  margin-top:-5px;
}

/* BUTTONS */
.buttons {
  transition:0.5s ease;
}

.btn {
  display:inline-block;
  margin:10px;
  padding:12px 24px;
  border:1px solid #00f0ff;
  color:#00f0ff;
  text-decoration:none;
  transition:0.3s;
}

.btn:hover {
  background:#00f0ff;
  color:black;
  box-shadow:0 0 25px #00f0ff;
}

/* === ACTIVE STATE (triggered by JS) === */

.hero.active .tagline {
  opacity:1;
  transform:translateY(-5px);
}

.hero.active .buttons {
  transform:translateY(25px);
}

.hero.active .title {
  text-shadow:0 0 50px #00f0ff;
}

.hero.active .bg-image {
  transform:translate(-50%, -55%) scale(1.06);
  filter: drop-shadow(0 0 90px #00f0ff);
}

/* SECTIONS */
.section {
  padding:100px 20px;
}

/* MERCH */
.merch-grid {
  display:grid;
  grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
  gap:20px;
  max-width:800px;
  margin:40px auto;
}

.item img {
  width:100%;
  border:1px solid #00f0ff;
}

.item p {
  margin-top:10px;
}

/* FOOTER */
.footer {
  padding:20px;
  opacity:0.5;
}
</style>
</head>

<body>

<div class="lang-switch">
  <button id="enBtn" onclick="setLang('en')">EN</button>
  <button id="czBtn" onclick="setLang('cz')">CZ</button>
  <button id="deBtn" onclick="setLang('de')">DE</button>
</div>

<div class="hero" id="hero">
  <img src="bg.png" class="bg-image" id="img">
  <h1 class="title" id="title">8th Ape Studio</h1>
  <p id="tagline" class="tagline"></p>

  <div class="buttons">
    <a href="#music" class="btn" id="btn1"></a>
    <a href="#projects" class="btn" id="btn2"></a>
    <a href="#merch" class="btn" id="btn3"></a>
    <a href="#contact" class="btn" id="btn4"></a>
  </div>
</div>

<div id="music" class="section">
  <h2 id="musicTitle"></h2>
  <p id="musicText"></p>
</div>

<div id="projects" class="section">
  <h2 id="projTitle"></h2>
  <p id="projText"></p>
</div>

<div id="merch" class="section">
  <h2>MERCH / DROP</h2>
  <p id="merchText"></p>

  <div class="merch-grid">
    <div class="item"><img src="bg.png"><p>DROP_01</p></div>
    <div class="item"><img src="bg.png"><p>DROP_02</p></div>
    <div class="item"><img src="bg.png"><p>DROP_03</p></div>
    <div class="item"><img src="bg.png"><p>DROP_04</p></div>
  </div>
</div>

<div id="contact" class="section">
  <h2 id="contactTitle"></h2>
  <p>8thApe-Sound@proton.me</p>
</div>

<div class="footer">
  © 8th Ape Studio
</div>

<script>
const hero = document.getElementById("hero");
const img = document.getElementById("img");
const title = document.getElementById("title");

function activate() {
  hero.classList.add("active");
}

function deactivate() {
  hero.classList.remove("active");
}

img.addEventListener("mouseenter", activate);
img.addEventListener("mouseleave", deactivate);

title.addEventListener("mouseenter", activate);
title.addEventListener("mouseleave", deactivate);

/* LANGUAGE */
const content = {
  en: {
    tagline: "AI Music · Visual Experiments · Digital Identity",
    btn1: "Listen",
    btn2: "Projects",
    btn3: "Merch",
    btn4: "Contact",
    musicTitle: "Music",
    musicText: "Latest releases coming soon",
    projTitle: "Projects",
    projText: "AI video · experimental visuals",
    merchText: "concept pieces · coming soon",
    contactTitle: "Contact"
  },
  cz: {
    tagline: "AI hudba · vizuální experimenty · digitální identita",
    btn1: "Hudba",
    btn2: "Projekty",
    btn3: "Merch",
    btn4: "Kontakt",
    musicTitle: "Hudba",
    musicText: "Nové skladby brzy",
    projTitle: "Projekty",
    projText: "AI video · vizuální tvorba",
    merchText: "koncept · brzy",
    contactTitle: "Kontakt"
  },
  de: {
    tagline: "AI Musik · visuelle Experimente · digitale Identität",
    btn1: "Musik",
    btn2: "Projekte",
    btn3: "Merch",
    btn4: "Kontakt",
    musicTitle: "Musik",
    musicText: "Neue Releases bald",
    projTitle: "Projekte",
    projText: "AI Video · visuelle Experimente",
    merchText: "Konzept · bald",
    contactTitle: "Kontakt"
  }
};

function setLang(lang) {
  document.getElementById("tagline").innerText = content[lang].tagline;
  document.getElementById("btn1").innerText = content[lang].btn1;
  document.getElementById("btn2").innerText = content[lang].btn2;
  document.getElementById("btn3").innerText = content[lang].btn3;
  document.getElementById("btn4").innerText = content[lang].btn4;
  document.getElementById("musicTitle").innerText = content[lang].musicTitle;
  document.getElementById("musicText").innerText = content[lang].musicText;
  document.getElementById("projTitle").innerText = content[lang].projTitle;
  document.getElementById("projText").innerText = content[lang].projText;
  document.getElementById("merchText").innerText = content[lang].merchText;
  document.getElementById("contactTitle").innerText = content[lang].contactTitle;

  document.getElementById("enBtn").classList.remove("active");
  document.getElementById("czBtn").classList.remove("active");
  document.getElementById("deBtn").classList.remove("active");

  document.getElementById(lang + "Btn").classList.add("active");
}

setLang('en');
</script>

</body>
</html>
