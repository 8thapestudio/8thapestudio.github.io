<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>8th Ape Studio</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<style>
body {
  margin:0;
  font-family:'Orbitron', sans-serif;
  color:white;
  background:black;
  text-align:center;
  overflow-x:hidden;
}

/* LANGUAGE */
.lang-switch {
  position:fixed;
  top:15px;
  right:20px;
  z-index:10;
}

.lang-switch button {
  background:none;
  border:1px solid #00f0ff;
  color:#00f0ff;
  margin:2px;
  padding:5px 10px;
  cursor:pointer;
}

/* HERO WRAPPER */
.hero {
  position:relative;
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:flex-end;
  align-items:center;
  padding-bottom:12vh;
}

/* BUBBLE */
.bg-image {
  position:absolute;
  top:35%;
  left:50%;
  transform:translate(-50%, -50%);
  width:60vw;
  max-width:700px;
  opacity:0.85;
  pointer-events:none;
  animation: float 8s ease-in-out infinite;
  filter: drop-shadow(0 0 40px #00f0ff);
  z-index:-1;
}

/* FLOAT */
@keyframes float {
  0%,100% { transform:translate(-50%, -50%) scale(1); }
  50% { transform:translate(-50%, -53%) scale(1.03); }
}

/* OVERLAY */
.overlay {
  position:fixed;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.6);
  backdrop-filter: blur(4px);
  z-index:-2;
}

/* TITLE */
h1 {
  font-size:3rem;
  opacity:0;
  animation: fadeIn 1.5s ease forwards;
  text-shadow:0 0 20px #00f0ff;
}

@keyframes fadeIn {
  to { opacity:1; }
}

p {
  opacity:0.7;
}

/* BUTTONS */
.btn {
  display:inline-block;
  margin:10px;
  padding:12px 24px;
  border:1px solid #00f0ff;
  color:#00f0ff;
  text-decoration:none;
  transition:0.3s;
}

.btn:hover {
  transform: translateY(-3px) scale(1.05);
  background:#00f0ff;
  color:black;
  box-shadow:0 0 30px #00f0ff;
}

/* SECTIONS */
.section {
  padding:100px 20px;
  background:black;
}

/* MERCH */
.merch-grid {
  display:grid;
  grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
  gap:20px;
  max-width:600px;
  margin:40px auto;
}

.item {
  border:1px solid #00f0ff;
  padding:30px;
  transition:0.3s;
}

.item:hover {
  transform:scale(1.05);
  background:#00f0ff;
  color:black;
}

/* FOOTER */
.footer {
  padding:20px;
  opacity:0.5;
}
</style>
</head>

<body>

<div class="lang-switch">
  <button onclick="setLang('en')">EN</button>
  <button onclick="setLang('cz')">CZ</button>
  <button onclick="setLang('de')">DE</button>
</div>

<div class="overlay"></div>

<!-- HERO -->
<div class="hero">
  <img src="bg.png" class="bg-image">

  <h1>8th Ape Studio</h1>
  <p id="tagline"></p>

  <div>
    <a href="#music" class="btn" id="btn1"></a>
    <a href="#projects" class="btn" id="btn2"></a>
    <a href="#merch" class="btn" id="btn3"></a>
    <a href="#contact" class="btn" id="btn4"></a>
  </div>
</div>

<!-- MUSIC -->
<div id="music" class="section">
  <h2 id="musicTitle"></h2>
  <p id="musicText"></p>
</div>

<!-- PROJECTS -->
<div id="projects" class="section">
  <h2 id="projTitle"></h2>
  <p id="projText"></p>
</div>

<!-- MERCH -->
<div id="merch" class="section">
  <h2>MERCH / DROP</h2>
  <p id="merchText"></p>

  <div class="merch-grid">
    <div class="item">DROP_01</div>
    <div class="item">DROP_02</div>
    <div class="item">DROP_03</div>
    <div class="item">DROP_04</div>
  </div>
</div>

<!-- CONTACT -->
<div id="contact" class="section">
  <h2 id="contactTitle"></h2>
  <p>8thApe-Sound@proton.me</p>
</div>

<div class="footer">
  © 8th Ape Studio
</div>

<script>
const content = {
  en: {
    tagline: "AI Music · Visual Experiments · Digital Identity",
    btn1: "Listen",
    btn2: "Projects",
    btn3: "Merch",
    btn4: "Contact",
    musicTitle: "Music",
    musicText: "Latest releases coming soon",
    projTitle: "Projects",
    projText: "AI video · experimental visuals · digital art",
    merchText: "concept pieces · coming soon",
    contactTitle: "Contact"
  },
  cz: {
    tagline: "AI hudba · vizuální experimenty · digitální identita",
    btn1: "Hudba",
    btn2: "Projekty",
    btn3: "Merch",
    btn4: "Kontakt",
    musicTitle: "Hudba",
    musicText: "Nové skladby brzy",
    projTitle: "Projekty",
    projText: "AI video · experimentální vizuály",
    merchText: "koncept · již brzy",
    contactTitle: "Kontakt"
  },
  de: {
    tagline: "AI Musik · visuelle Experimente · digitale Identität",
    btn1: "Musik",
    btn2: "Projekte",
    btn3: "Merch",
    btn4: "Kontakt",
    musicTitle: "Musik",
    musicText: "Neue Releases bald verfügbar",
    projTitle: "Projekte",
    projText: "AI Video · visuelle Experimente",
    merchText: "Konzept · bald verfügbar",
    contactTitle: "Kontakt"
  }
};

function setLang(lang) {
  document.getElementById("tagline").innerText = content[lang].tagline;
  document.getElementById("btn1").innerText = content[lang].btn1;
  document.getElementById("btn2").innerText = content[lang].btn2;
  document.getElementById("btn3").innerText = content[lang].btn3;
  document.getElementById("btn4").innerText = content[lang].btn4;
  document.getElementById("musicTitle").innerText = content[lang].musicTitle;
  document.getElementById("musicText").innerText = content[lang].musicText;
  document.getElementById("projTitle").innerText = content[lang].projTitle;
  document.getElementById("projText").innerText = content[lang].projText;
  document.getElementById("merchText").innerText = content[lang].merchText;
  document.getElementById("contactTitle").innerText = content[lang].contactTitle;
}

setLang('en');
</script>

</body>
</html>
