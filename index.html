<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>8th Ape Studio | AI Music & Visual Experience</title>
<meta name="description" content="8th Ape Studio creates experimental music, AI visuals and digital experiences.">

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<style>
body {
  margin:0;
  font-family:'Orbitron', sans-serif;
  background:black;
  color:white;
  text-align:center;
}

.hero {
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
}

h1 {
  font-size:3rem;
  letter-spacing:2px;
  text-shadow:0 0 10px #00f0ff;
}

p {
  opacity:0.7;
  margin:20px 0;
}

.buttons {
  margin-top:20px;
}

.btn {
  display:inline-block;
  margin:10px;
  padding:12px 24px;
  border:1px solid #00f0ff;
  color:#00f0ff;
  text-decoration:none;
  transition:0.3s;
}

.btn:hover {
  background:#00f0ff;
  color:black;
  box-shadow:0 0 15px #00f0ff;
}

.footer {
  position:absolute;
  bottom:20px;
  width:100%;
  font-size:12px;
  opacity:0.5;
}
</style>
</head>

<body>

<div class="hero">
  <h1>8th Ape Studio</h1>
  <p>AI Music · Visual Experiments · Digital Identity</p>

  <div class="buttons">
    <a href="#" class="btn">Listen</a>
    <a href="#" class="btn">Projects</a>
    <a href="#" class="btn">Contact</a>
  </div>
</div>

<div class="footer">
  © 8th Ape Studio
</div>

</body>
</html>
