<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>8th Ape Studio</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<style>
body {
  margin:0;
  font-family:'Orbitron', sans-serif;
  color:white;
  background:black;
  text-align:center;
}

/* LANGUAGE FLAGS */
.lang-switch {
  position:fixed;
  top:15px;
  right:20px;
  z-index:10;
  display:flex;
  gap:6px;
}

.lang-switch button {
  font-size:20px;
  background:none;
  border:1px solid #00f0ff;
  padding:4px 8px;
  cursor:pointer;
  opacity:0.6;
  transition:0.3s;
}

.lang-switch button.active {
  opacity:1;
  box-shadow:0 0 10px #00f0ff;
}

/* HERO */
.hero {
  position:relative;
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:flex-end;
  align-items:center;
  padding-bottom:12vh;
}

/* BUBBLE */
.bg-image {
  position:absolute;
  top:32%;
  left:50%;
  transform:translate(-50%, -50%);
  width:60vw;
  max-width:700px;
  opacity:0.9;
  animation: float 8s ease-in-out infinite;
  filter: drop-shadow(0 0 40px #00f0ff);
  transition:0.5s ease;
  z-index:1;
}

@keyframes float {
  0%,100% { transform:translate(-50%, -50%) scale(1); }
  50% { transform:translate(-50%, -54%) scale(1.03); }
}

/* TITLE */
.title span {
  font-size:3.5rem;
  text-shadow:0 0 25px #00f0ff;
  display:inline-block;
  transition:0.5s ease;
}

/* TAGLINE */
.tagline {
  opacity:0;
  transform:translateY(-40px);
  transition:0.5s ease;
  font-size:1.2rem;
}

/* BUTTONS */
.buttons {
  transition:0.5s ease;
}

.btn {
  display:inline-block;
  margin:10px;
  padding:12px 24px;
  border:1px solid #00f0ff;
  color:#00f0ff;
  text-decoration:none;
}

.btn:hover {
  background:#00f0ff;
  color:black;
}

/* ACTIVE */
.hero.active .tagline {
  opacity:1;
  transform:translateY(-5px);
}

.hero.active .buttons {
  transform:translateY(25px);
}

.hero.active .title span {
  text-shadow:0 0 50px #00f0ff;
}

.hero.active .bg-image {
  transform:translate(-50%, -55%) scale(1.06);
  filter: drop-shadow(0 0 90px #00f0ff);
}

/* SECTION */
.section {
  padding:100px 20px;
}

.footer {
  padding:20px;
  opacity:0.5;
}
</style>
</head>

<body>

<div class="lang-switch">
  <button id="enBtn" onclick="setLang('en')">🇬🇧</button>
  <button id="czBtn" onclick="setLang('cz')">🇨🇿</button>
  <button id="deBtn" onclick="setLang('de')">🇩🇪</button>
  <button id="arBtn" onclick="setLang('ar')">🇸🇦</button>
  <button id="hiBtn" onclick="setLang('hi')">🇮🇳</button>
</div>

<div class="hero" id="hero">
  <img src="bg.png" class="bg-image" id="img">

  <h1 class="title">
    <span id="titleText">8th Ape Studio</span>
  </h1>

  <p id="tagline" class="tagline"></p>

  <div class="buttons">
    <a href="#music" class="btn" id="btn1"></a>
    <a href="#projects" class="btn" id="btn2"></a>
    <a href="#merch" class="btn" id="btn3"></a>
    <a href="#contact" class="btn" id="btn4"></a>
  </div>
</div>

<div class="section">
  <h2 id="musicTitle"></h2>
  <p id="musicText"></p>
</div>

<div class="footer">© 8th Ape Studio</div>

<script>
const hero = document.getElementById("hero");
const titleText = document.getElementById("titleText");
const img = document.getElementById("img");

function isInsideReducedZone(e) {
  const rect = titleText.getBoundingClientRect();
  const imgRect = img.getBoundingClientRect();
  const shrink = rect.width * 0.05;

  return (
    e.clientX > rect.left + shrink &&
    e.clientX < rect.right - shrink &&
    e.clientY > imgRect.top &&
    e.clientY < rect.bottom + 200
  );
}

document.addEventListener("mousemove", (e) => {
  if (isInsideReducedZone(e)) {
    hero.classList.add("active");
  } else {
    hero.classList.remove("active");
  }
});

/* LANG CONTENT */
const content = {
  en: {
    tagline: "AI Music · Visual Experiments · Digital Identity",
    btn1: "Listen",
    btn2: "Projects",
    btn3: "Merch",
    btn4: "Contact",
    musicTitle: "Music",
    musicText: "Latest releases coming soon"
  },
  cz: {
    tagline: "AI hudba · vizuální experimenty · digitální identita",
    btn1: "Hudba",
    btn2: "Projekty",
    btn3: "Merch",
    btn4: "Kontakt",
    musicTitle: "Hudba",
    musicText: "Nové skladby brzy"
  },
  de: {
    tagline: "AI Musik · visuelle Experimente · digitale Identität",
    btn1: "Musik",
    btn2: "Projekte",
    btn3: "Merch",
    btn4: "Kontakt",
    musicTitle: "Musik",
    musicText: "Neue Releases bald"
  },
  ar: {
    tagline: "موسيقى الذكاء الاصطناعي · تجارب بصرية · هوية رقمية",
    btn1: "استمع",
    btn2: "مشاريع",
    btn3: "متجر",
    btn4: "اتصال",
    musicTitle: "الموسيقى",
    musicText: "إصدارات قادمة قريباً"
  },
  hi: {
    tagline: "एआई संगीत · दृश्य प्रयोग · डिजिटल पहचान",
    btn1: "सुनो",
    btn2: "प्रोजेक्ट्स",
    btn3: "मर्च",
    btn4: "संपर्क",
    musicTitle: "संगीत",
    musicText: "जल्द आ रहा है"
  }
};

function setLang(lang) {
  document.getElementById("tagline").innerText = content[lang].tagline;
  document.getElementById("btn1").innerText = content[lang].btn1;
  document.getElementById("btn2").innerText = content[lang].btn2;
  document.getElementById("btn3").innerText = content[lang].btn3;
  document.getElementById("btn4").innerText = content[lang].btn4;
  document.getElementById("musicTitle").innerText = content[lang].musicTitle;
  document.getElementById("musicText").innerText = content[lang].musicText;

  document.querySelectorAll(".lang-switch button").forEach(btn => btn.classList.remove("active"));
  document.getElementById(lang + "Btn").classList.add("active");
}

setLang('en');
</script>

</body>
</html>
